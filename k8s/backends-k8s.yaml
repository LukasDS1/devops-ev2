apiVersion: apps/v1
kind: Deployment
metadata:
  name: despacho-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: despacho-backend
  template:
    metadata:
      labels:
        app: despacho-backend
    spec:
      containers:
        - name: despacho-backend
          image: 992382689365.dkr.ecr.us-east-1.amazonaws.com/despachos-backend:latest
          ports:
            - containerPort: 8081
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "200m"
              memory: "512Mi"
          env:
            - name: DB_ENDPOINT
              value: "db-despacho"
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              value: "despacho_db"
            - name: DB_USERNAME
              value: "root"
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bd-credenciales
                  key: mysql-root-password
---
apiVersion: v1
kind: Service
metadata:
  name: despacho-backend-svc
spec:
  selector:
    app: despacho-backend
  ports:
    - port: 8081
      targetPort: 8081
---
