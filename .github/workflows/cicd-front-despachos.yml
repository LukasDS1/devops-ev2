name: CI/CD - Despacho Frontend

on:
  push:
    branches: [deploy]
    paths:
      - 'front_despacho/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Obtener version
        id: version
        run: echo "VERSION=v$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login en Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build y Push imagen
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPO: despacho-frontend
        run: |
          docker build -t $ECR_REGISTRY/$REPO:${{ steps.version.outputs.VERSION }} ./front_despacho
          docker push $ECR_REGISTRY/$REPO:${{ steps.version.outputs.VERSION }}

      - name: Configurar kubectl
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name despacho-cluster

      - name: Desplegar en EKS (Manteniendo Estructura)
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          # Reemplaza la imagen vieja por la nueva en el manifiesto k8s respetando la sangría y estructura
          sed -i "s|image: .*despacho-frontend:.*|image: $ECR_REGISTRY/despacho-frontend:$VERSION|g" k8s/backends-k8s.yaml
          
          # Aplica el manifiesto completo de forma declarativa
          kubectl apply -f k8s/backends-k8s.yaml
          kubectl rollout status deployment/despacho-frontend --timeout=120s