name: CI/CD - Ventas Backend
#TRIGGER TEST

on:
  push:
    branches: [deploy]
    paths:
      - 'back-Ventas_SpringBoot/**'
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Obtener version
        id: version
        run: echo "VERSION=v$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y Push imagen
        run: |
          docker build -t dockermasterluka/ventas-backend:${{ steps.version.outputs.VERSION }} ./back-Ventas_SpringBoot/Springboot-API-REST
          docker push dockermasterluka/ventas-backend:${{ steps.version.outputs.VERSION }}

      - name: Desplegar en EC2 via SSM
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          aws ssm send-command \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":[
              "docker pull dockermasterluka/ventas-backend:${{ steps.version.outputs.VERSION }}",
              "docker stop ventas-backend || true",
              "docker rm ventas-backend || true",
              "cd /home/ec2-user && docker-compose -f docker-compose.backend.yml up -d mysql-ventas && sleep 40 && VERSION=${{ steps.version.outputs.VERSION }} docker-compose -f docker-compose.backend.yml up -d ventas-backend"
            ]}'